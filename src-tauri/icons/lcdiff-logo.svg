<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- graphite canvas, matches background / ink gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232a37"/>
      <stop offset="1" stop-color="#14181e"/>
    </linearGradient>
    <!-- brass wordmark, matches CSS h1 brass gradient -->
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#f4e6c6"/>
      <stop offset="0.62" stop-color="#d9b066"/>
      <stop offset="1"    stop-color="#b8944f"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.18" r="0.9">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded-square plate (transparent corners) -->
  <rect x="32" y="32" width="960" height="960" rx="220" fill="url(#bg)"/>
  <rect x="32" y="32" width="960" height="960" rx="220" fill="url(#sheen)"/>
  <rect x="32.5" y="32.5" width="959" height="959" rx="219.5" fill="none"
        stroke="#d9b066" stroke-opacity="0.16" stroke-width="2"/>

  <!-- LCDIFF wordmark: blocky stencil letters, brass gradient.
       content bbox x:68..996 y:366..736, recentred + scaled to fit. -->
  <g fill="url(#brass)" transform="translate(512 512) scale(0.82) translate(-532 -551)">

    <!-- L -->
    <rect x="68"  y="366" width="56"  height="292" rx="10"/>
    <rect x="68"  y="602" width="150" height="56"  rx="10"/>

    <!-- C -->
    <rect x="230" y="366" width="150" height="56" rx="10"/>
    <rect x="230" y="602" width="150" height="56" rx="10"/>
    <rect x="230" y="366" width="56" height="292" rx="10"/>

    <!-- D : solid left bar + brass annulus (reads as D, not O) -->
    <rect x="418" y="366" width="56" height="292" rx="10"/>
    <path d="M418 366 L474 366 A146 146 0 0 1 474 658 L418 658 Z
             M474 422 A90 90 0 0 1 474 602 Z" fill-rule="evenodd"/>

    <!-- I -->
    <rect x="594" y="366" width="56" height="292" rx="10"/>

    <!-- F -->
    <rect x="704" y="366" width="56"  height="292" rx="10"/>
    <rect x="704" y="366" width="150" height="56"  rx="10"/>
    <rect x="704" y="484" width="120" height="56"  rx="10"/>

    <!-- F -->
    <rect x="846" y="366" width="56"  height="292" rx="10"/>
    <rect x="846" y="366" width="150" height="56"  rx="10"/>
    <rect x="846" y="484" width="120" height="56"  rx="10"/>

    <!-- underline accent -->
    <rect x="80" y="706" width="916" height="30" rx="15"/>
  </g>
</svg>
