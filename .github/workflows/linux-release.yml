name: Linux Release
run-name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} - Linux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload, for example v0.3.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Ubuntu LTS matrix
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'notes=docs/release-notes/%s.md\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Linux AppImage/deb matrix
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: >-
          docker/build-linux-matrix.sh
          --arch amd64
          --ubuntu 22.04
          --ubuntu 24.04
          --bundles appimage,deb

      - name: Stage Linux release assets
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="${{ steps.release.outputs.tag }}"
          out="artifacts/release-linux"
          rm -rf "$out"
          mkdir -p "$out"
          cp \
            "artifacts/linux/ubuntu22.04-amd64/appimage/LCDiff_${version}_amd64.AppImage" \
            "$out/LCDiff_${version}_ubuntu22.04_amd64.AppImage"
          cp \
            "artifacts/linux/ubuntu22.04-amd64/appimage/LCDiff_${version}_amd64.AppImage.sig" \
            "$out/LCDiff_${version}_ubuntu22.04_amd64.AppImage.sig"
          cp \
            "artifacts/linux/ubuntu22.04-amd64/deb/LCDiff_${version}_amd64.deb" \
            "$out/LCDiff_${version}_ubuntu22.04_amd64.deb"
          cp \
            "artifacts/linux/ubuntu24.04-amd64/appimage/LCDiff_${version}_amd64.AppImage" \
            "$out/LCDiff_${version}_ubuntu24.04_amd64.AppImage"
          cp \
            "artifacts/linux/ubuntu24.04-amd64/appimage/LCDiff_${version}_amd64.AppImage.sig" \
            "$out/LCDiff_${version}_ubuntu24.04_amd64.AppImage.sig"
          cp \
            "artifacts/linux/ubuntu24.04-amd64/deb/LCDiff_${version}_amd64.deb" \
            "$out/LCDiff_${version}_ubuntu24.04_amd64.deb"
          export LCDIFF_VERSION="$version"
          export LCDIFF_TAG="$tag"
          export LCDIFF_UPDATER_ASSET="LCDiff_${version}_ubuntu22.04_amd64.AppImage"
          node - <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");
          const version = process.env.LCDIFF_VERSION;
          const tag = process.env.LCDIFF_TAG;
          const asset = process.env.LCDIFF_UPDATER_ASSET;
          const signature = readFileSync(`artifacts/release-linux/${asset}.sig`, "utf8").trim();
          writeFileSync("artifacts/release-linux/latest-linux-x86_64.json", JSON.stringify({
            version,
            notes: readFileSync(`docs/release-notes/v${version}.md`, "utf8"),
            pub_date: new Date().toISOString(),
            platforms: {
              "linux-x86_64": {
                signature,
                url: `https://github.com/lyokha113/lcdiff/releases/download/${tag}/${asset}`,
              },
            },
          }, null, 2));
          NODE
          cp scripts/install-linux.sh "$out/install-linux.sh"
          find "$out" \( -name "*.sig" -o -name "latest-*.json" \) -print
          ls -lh "$out"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcdiff-linux-${{ steps.release.outputs.tag }}
          path: artifacts/release-linux/*
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          body_path: ${{ steps.release.outputs.notes }}
          files: artifacts/release-linux/*

  publish-aur:
    name: Publish AUR metadata
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || needs.build-linux.outputs.release-tag }}

      - name: Verify AUR metadata matches release tag
        shell: bash
        run: |
          tag="${{ needs.build-linux.outputs.release-tag }}"
          version="${tag#v}"
          pkgver="$(sed -n 's/^pkgver=//p' aur/lcdiff/PKGBUILD)"
          srcinfo_pkgver="$(sed -n 's/^\t*pkgver = //p' aur/lcdiff/.SRCINFO)"

          test "$tag" = "v$version"
          test "$pkgver" = "$version"
          test "$srcinfo_pkgver" = "$version"
          test -f aur/lcdiff/LICENSE

      - name: Validate AUR package on Arch Linux
        shell: bash
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/aur/lcdiff:/pkg:ro" \
            archlinux:base-devel \
            bash -lc '
              pacman -Syu --needed --noconfirm \
                cairo gdk-pixbuf2 glib2 gtk3 \
                hicolor-icon-theme libappindicator-gtk3 librsvg libsoup3 \
                openssl pango webkit2gtk-4.1 xdotool git jdk17-openjdk \
                maven nodejs npm rust namcap &&
              useradd -m builder &&
              cp -a /pkg /home/builder/lcdiff &&
              chown -R builder:builder /home/builder/lcdiff &&
              su - builder -c "
                cd /home/builder/lcdiff &&
                makepkg --verifysource &&
                makepkg --cleanbuild --noconfirm &&
                namcap PKGBUILD &&
                namcap lcdiff-*.pkg.tar.zst
              "
            '

      - name: Configure AUR SSH key
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          test -n "$AUR_SSH_PRIVATE_KEY"
          install -m 0700 -d "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur"
          chmod 0600 "$HOME/.ssh/aur"
          ssh-keyscan -t ed25519 aur.archlinux.org > "$HOME/.ssh/known_hosts"
          cat >> "$HOME/.ssh/config" <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF
          chmod 0600 "$HOME/.ssh/config" "$HOME/.ssh/known_hosts"

      - name: Publish package source to AUR
        shell: bash
        run: |
          aur_checkout="$RUNNER_TEMP/lcdiff-aur"
          git clone ssh://aur@aur.archlinux.org/lcdiff.git "$aur_checkout"
          cp aur/lcdiff/PKGBUILD "$aur_checkout/PKGBUILD"
          cp aur/lcdiff/.SRCINFO "$aur_checkout/.SRCINFO"
          cp aur/lcdiff/LICENSE "$aur_checkout/LICENSE"

          cd "$aur_checkout"
          git config user.name "lyokha113"
          git config user.email "lyokha113@users.noreply.github.com"
          git add PKGBUILD .SRCINFO LICENSE

          if git diff --cached --quiet; then
            echo "AUR metadata is already current."
            exit 0
          fi

          git commit -m "Update lcdiff to ${{ needs.build-linux.outputs.release-tag }}"
          git push origin HEAD:master
