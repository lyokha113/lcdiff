name: macOS Release
run-name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} - macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload, for example v0.3.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-15

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'notes=docs/release-notes/%s.md\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Rust target
        shell: bash
        run: rustup target add aarch64-apple-darwin

      - name: Build and validate macOS DMG
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: scripts/verify-macos-distribution.sh --target aarch64-apple-darwin

      - name: Stage macOS release assets
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="${{ steps.release.outputs.tag }}"
          mkdir -p artifacts/macos
          cp \
            target/aarch64-apple-darwin/release/bundle/dmg/LCDiff-aarch64-apple-darwin.dmg \
            "artifacts/macos/LCDiff-${version}-aarch64.dmg"
          updater_bundle="$(find target/aarch64-apple-darwin/release/bundle/macos -name "*.app.tar.gz" -print -quit)"
          updater_sig="$updater_bundle.sig"
          if [[ -z "$updater_bundle" || ! -f "$updater_sig" ]]; then
            printf 'missing macOS updater bundle or signature\n' >&2
            exit 1
          fi
          updater_asset="LCDiff-${version}-aarch64.app.tar.gz"
          cp "$updater_bundle" "artifacts/macos/$updater_asset"
          cp "$updater_sig" "artifacts/macos/$updater_asset.sig"
          export LCDIFF_VERSION="$version"
          export LCDIFF_TAG="$tag"
          export LCDIFF_UPDATER_ASSET="$updater_asset"
          node - <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");
          const version = process.env.LCDIFF_VERSION;
          const tag = process.env.LCDIFF_TAG;
          const asset = process.env.LCDIFF_UPDATER_ASSET;
          const signature = readFileSync(`artifacts/macos/${asset}.sig`, "utf8").trim();
          writeFileSync("artifacts/macos/latest-darwin-aarch64.json", JSON.stringify({
            version,
            notes: readFileSync(`docs/release-notes/v${version}.md`, "utf8"),
            pub_date: new Date().toISOString(),
            platforms: {
              "darwin-aarch64": {
                signature,
                url: `https://github.com/lyokha113/lcdiff/releases/download/${tag}/${asset}`,
              },
            },
          }, null, 2));
          NODE
          cp scripts/install-macos.sh artifacts/macos/install-macos.sh
          find artifacts/macos \( -name "*.sig" -o -name "latest-*.json" \) -print
          ls -lh artifacts/macos

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcdiff-macos-${{ steps.release.outputs.tag }}
          path: artifacts/macos/*
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          body_path: ${{ steps.release.outputs.notes }}
          files: artifacts/macos/*
