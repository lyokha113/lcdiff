name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload, for example v0.3.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-15

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'notes=docs/release-notes/%s.md\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Rust target
        shell: bash
        run: rustup target add aarch64-apple-darwin

      - name: Build and validate macOS DMG
        shell: bash
        run: scripts/verify-macos-distribution.sh --target aarch64-apple-darwin

      - name: Stage macOS release assets
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          mkdir -p artifacts/macos
          cp \
            target/aarch64-apple-darwin/release/bundle/dmg/LCDiff-aarch64-apple-darwin.dmg \
            "artifacts/macos/LCDiff-${version}-aarch64.dmg"
          cp scripts/install-macos.sh artifacts/macos/install-macos.sh
          ls -lh artifacts/macos

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcdiff-macos-${{ steps.release.outputs.tag }}
          path: artifacts/macos/*
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          body_path: ${{ steps.release.outputs.notes }}
          files: artifacts/macos/*
