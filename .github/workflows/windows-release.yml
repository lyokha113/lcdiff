name: Windows Release
run-name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }} - Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload, for example v0.3.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "notes=docs/release-notes/$tag.md" >> $env:GITHUB_OUTPUT

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Windows NSIS installer
        shell: pwsh
        run: scripts/build-windows.ps1 -Bundles nsis -SignIfSecretsPresent
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcdiff-windows-${{ steps.release.outputs.tag }}
          path: artifacts/windows/*
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          body_path: ${{ steps.release.outputs.notes }}
          files: artifacts/windows/*
