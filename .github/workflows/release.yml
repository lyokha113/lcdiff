name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  bundle:
    name: Build and package
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: app
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: app
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
    runs-on: ${{ matrix.os }}
    env:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux WebKitGTK dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium with Linux deps
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Verify release invariants
        run: npm run verify:all

      - name: Assemble Java runtime resources
        run: JDIFF_JLINK="$JAVA_HOME/bin/jlink" scripts/assemble-sidecar-resources.sh

      - name: Verify bundled sidecar
        shell: bash
        run: test -f src-tauri/resources/sidecar/jdiff-sidecar.jar

      - name: Build unsigned bundles
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Import macOS Developer ID certificate
        if: |
          runner.os == 'macOS' &&
          env.MACOS_CERTIFICATE_BASE64 != '' &&
          env.MACOS_CERTIFICATE_PASSWORD != '' &&
          env.MACOS_KEYCHAIN_PASSWORD != '' &&
          env.MACOS_SIGN_IDENTITY != ''
        shell: bash
        run: |
          KEYCHAIN="$RUNNER_TEMP/jdiff-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/macos-cert.p12"
          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT_PATH"

      - name: Sign macOS app for notarization
        if: |
          runner.os == 'macOS' &&
          env.MACOS_CERTIFICATE_BASE64 != '' &&
          env.MACOS_CERTIFICATE_PASSWORD != '' &&
          env.MACOS_KEYCHAIN_PASSWORD != '' &&
          env.MACOS_SIGN_IDENTITY != ''
        shell: bash
        run: scripts/sign-macos-bundle.sh "target/${{ matrix.target }}/release/bundle/macos/jdiff.app" "$MACOS_SIGN_IDENTITY" "target/${{ matrix.target }}/release/bundle/macos/jdiff-signed.app"

      - name: Notarize macOS app
        if: |
          runner.os == 'macOS' &&
          env.MACOS_CERTIFICATE_BASE64 != '' &&
          env.MACOS_CERTIFICATE_PASSWORD != '' &&
          env.MACOS_KEYCHAIN_PASSWORD != '' &&
          env.MACOS_SIGN_IDENTITY != '' &&
          env.APPLE_ID != '' &&
          env.APPLE_TEAM_ID != '' &&
          env.APPLE_APP_PASSWORD != ''
        shell: bash
        run: scripts/notarize-macos-app.sh "target/${{ matrix.target }}/release/bundle/macos/jdiff-signed.app"

      - name: Promote final macOS app
        if: |
          runner.os == 'macOS' &&
          env.MACOS_CERTIFICATE_BASE64 != '' &&
          env.MACOS_CERTIFICATE_PASSWORD != '' &&
          env.MACOS_SIGN_IDENTITY != ''
        shell: bash
        run: |
          SIGNED_APP_PATH="target/${{ matrix.target }}/release/bundle/macos/jdiff-signed.app"
          FINAL_APP_PATH="target/${{ matrix.target }}/release/bundle/macos/jdiff.app"
          if [ -d "$SIGNED_APP_PATH" ]; then
            rm -rf "$FINAL_APP_PATH"
            ditto --norsrc "$SIGNED_APP_PATH" "$FINAL_APP_PATH"
            rm -rf "$SIGNED_APP_PATH"
          fi

      - name: Package macOS DMG from final app
        if: runner.os == 'macOS'
        shell: bash
        run: scripts/package-macos-dmg.sh "target/${{ matrix.target }}/release/bundle/macos/jdiff.app" "target/${{ matrix.target }}/release/bundle/dmg/jdiff-${{ matrix.target }}.dmg"

      - name: Sign Windows bundles
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_BASE64 != '' && env.WINDOWS_CERTIFICATE_PASSWORD != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows-cert.pfx"
          [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64) | Set-Content -AsByteStream -LiteralPath $certPath
          $timestampUrl = if ($env:WINDOWS_TIMESTAMP_URL) { $env:WINDOWS_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }
          scripts/sign-windows-bundles.ps1 -BundleDir "target/${{ matrix.target }}/release/bundle" -CertificatePath $certPath -CertificatePassword "$env:WINDOWS_CERTIFICATE_PASSWORD" -TimestampUrl $timestampUrl
          Remove-Item -LiteralPath $certPath -Force

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: jdiff-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.app
            target/${{ matrix.target }}/release/bundle/**/*.dmg
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.rpm
            target/${{ matrix.target }}/release/bundle/**/*.exe
            target/${{ matrix.target }}/release/bundle/**/*.msi
          if-no-files-found: ignore
